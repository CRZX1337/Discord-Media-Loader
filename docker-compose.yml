services:
  discord-bot:
    build: .
    container_name: media-downloader-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - INSTAGRAM_USERNAME=${INSTAGRAM_USERNAME}
    ports:
      - "8080:8080"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      # Save downloads persistently in a hosted folder (in case OS cleanup skips a beat)
      - ./downloads:/app/downloads
      - ./.env:/app/.env
      - ./cookies.txt:/app/cookies.txt
      - ./session:/app/session
